server {
    listen 80;
    server_name localhost;

    # 编码
    charset utf-8;

    # Vue 构建产物目录
    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------------
    # 反向代理：将 /api、/my、/uploads 转发给后端容器
    # "backend" 是 docker-compose 中后端服务的名称
    # -----------------------------------------------
    location /api/ {
        proxy_pass http://backend:3007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /my/ {
        proxy_pass http://backend:3007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 用户上传的图片/文件（后端托管的静态资源）
    location /uploads/ {
        proxy_pass http://backend:3007;
        proxy_set_header Host $host;
    }

    # -----------------------------------------------
    # 关键：处理 Vue Router 的 HTML5 history 模式
    # 所有前端路由（如 /home、/square）都返回 index.html
    # 再由 Vue Router 在客户端解析
    # -----------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（Vite 构建的 assets 带有内容哈希，可以长期缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 错误页
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
